<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Scale & Position Editor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- Exactly mimics the production site object-fit: cover scaling --- */
        .photo-reveal {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .photo-reveal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0.5; /* Dimmed slightly for contrast */
        }
        .photo-tracker {
            position: absolute;
            width: max(100vw, 100vh * 1.443609);
            height: max(100vh, 100vw * 0.692708);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 25;
        }

        .man-container {
            position: absolute;
            top: 30%; /* Defaults */
            left: 34%;
            height: 74%;
            transform: translateX(-40%);
            pointer-events: auto; /* Allow hovering if needed */
        }

        .man-svg {
            height: 100%;
            width: auto;
            position: relative;
        }
        
        /* Make the SVG explicitly red in the editor for visibility against the silhouette */
        .man-svg g {
            fill: #ff3b30 !important;
            stroke: #ff3b30 !important;
        }

        /* --- Editor UI styling --- */
        #editor-ui {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin: 0 0 15px 0; font-size: 18px; font-weight: 500; letter-spacing: 0.5px; }

        .slider-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .slider-group label {
            width: 80px;
            font-size: 14px;
            color: #ccc;
        }

        .slider-group input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
        }

        .value-display {
            width: 50px;
            text-align: right;
            font-family: monospace;
            font-size: 14px;
            color: #4cd964;
        }

        .code-output {
            margin-top: 20px;
            background: #000;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
            font-size: 13px;
            color: #5ac8fa;
            white-space: pre-wrap;
            user-select: all;
        }
        
        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            line-height: 1.4;
        }

        /* Initial Pose Rotations so he matches the crossfade */
        #runner { transform: rotate(4deg); }
        #leg-front { transform: rotate(-27deg); }
        #knee-front { transform: rotate(15deg); }
        #leg-back { transform: rotate(25deg); }
        #knee-back { transform: rotate(6deg); }
        #arm-front { transform: rotate(25deg); }
        #arm-back { transform: rotate(-32deg); }
        #elbow-back { transform: rotate(-5deg); }
        #briefcase-group { transform: rotate(8deg); }
    </style>
</head>
<body>

    <!-- Background exactly like the site -->
    <div class="photo-reveal">
        <img src="/original_logo_photo.JPG" class="photo-reveal-img" />
    </div>

    <!-- The coordinate space wrapper -->
    <div class="photo-tracker">
        <!-- The SVG -->
        <div class="man-container" id="manContainer">
            <svg class="man-svg" viewBox="-50 -20 300 400" xmlns="http://www.w3.org/2000/svg">
                <g id="runner" stroke-linecap="round" stroke-linejoin="round">
                    <g id="arm-back">
                        <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
                        <g id="elbow-back">
                            <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
                            <g id="briefcase-group">
                                <path d="M 90 160 v -10 h 20 v 10" stroke-width="4" fill="none" />
                                <rect x="75" y="160" width="50" height="35" rx="4" />
                            </g>
                        </g>
                    </g>
                    <g id="leg-back">
                        <line x1="90" y1="160" x2="90" y2="230" stroke-width="22" />
                        <g id="knee-back">
                            <line x1="90" y1="230" x2="90" y2="300" stroke-width="18" />
                            <path d="M 80 300 h 30 v 15 h 15 v 10 h -45 z" />
                        </g>
                    </g>
                    <g id="head-torso">
                        <ellipse cx="100" cy="15" rx="15" ry="18" />
                        <path d="M 85 40 Q 100 35 115 40 L 115 160 Q 100 170 85 160 z" />
                    </g>
                    <g id="leg-front">
                        <line x1="110" y1="160" x2="110" y2="230" stroke-width="22" />
                        <g id="knee-front">
                            <line x1="110" y1="230" x2="110" y2="300" stroke-width="18" />
                            <path d="M 100 300 h 30 v 15 h 15 v 10 h -45 z" />
                        </g>
                    </g>
                    <g id="arm-front">
                        <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
                        <g id="elbow-front">
                            <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
                        </g>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <!-- UI Panel -->
    <div id="editor-ui">
        <h2>Visual Layout Tuner</h2>

        <div class="slider-group">
            <label for="heightSlider">Scale %</label>
            <input type="range" id="heightSlider" min="20" max="150" value="78" step="0.5">
            <span class="value-display" id="heightVal">78.0%</span>
        </div>

        <div class="slider-group">
            <label for="topSlider">Top %</label>
            <input type="range" id="topSlider" min="0" max="100" value="28" step="0.5">
            <span class="value-display" id="topVal">28.0%</span>
        </div>

        <div class="slider-group">
            <label for="leftSlider">Left %</label>
            <input type="range" id="leftSlider" min="0" max="100" value="33" step="0.5">
            <span class="value-display" id="leftVal">33.0%</span>
        </div>

        <div class="code-output" id="cssOutput">
.man-container {
  top: 28%;
  left: 33%;
  height: 78%;
}</div>
        <div class="hint">Copy these values into your opening-experiment/css/index.css ".man-container" selector. Note that transform: translateX(-40%) remains locked!</div>
    </div>

    <script>
        const manContainer = document.getElementById('manContainer');
        const heightSlider = document.getElementById('heightSlider');
        const topSlider = document.getElementById('topSlider');
        const leftSlider = document.getElementById('leftSlider');

        const heightVal = document.getElementById('heightVal');
        const topVal = document.getElementById('topVal');
        const leftVal = document.getElementById('leftVal');

        const cssOutput = document.getElementById('cssOutput');

        function updateTransform() {
            const h = heightSlider.value;
            const t = topSlider.value;
            const l = leftSlider.value;

            // Update UI Labels
            heightVal.textContent = parseFloat(h).toFixed(1) + '%';
            topVal.textContent = parseFloat(t).toFixed(1) + '%';
            leftVal.textContent = parseFloat(l).toFixed(1) + '%';

            // Apply directly to element
            manContainer.style.height = h + '%';
            manContainer.style.top = t + '%';
            manContainer.style.left = l + '%';

            // Generate CSS Text
            cssOutput.textContent = 
`.man-container {
  top: ${t}%;
  left: ${l}%;
  height: ${h}%;
}`;
        }

        // Attach listeners
        heightSlider.addEventListener('input', updateTransform);
        topSlider.addEventListener('input', updateTransform);
        leftSlider.addEventListener('input', updateTransform);

        // Init
        updateTransform();
    </script>
</body>
</html>
