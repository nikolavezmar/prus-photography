<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prus Photography — Capturing Moments</title>
  <meta name="description" content="Prus Photography — Fine art and portrait photography." />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="stylesheet" href="/opening-experiment/css/index.css?v=12" />
  <link rel="stylesheet" href="/opening-experiment/css/anim_run.css?v=12" />
</head>

<body>

  <!-- =============================================
       PHOTO REVEAL OVERLAY
       Shows the original logo photo, then fades out
       ============================================= -->
  <div class="photo-reveal" id="photoReveal">
    <img src="/original_logo_photo.JPG" alt="Original logo photograph — silhouette of a man walking" class="photo-reveal-img" />
  </div>

  <div class="intro-scene" id="introScene">

    <!-- Container that perfectly mirrors the object-fit: cover of the photo -->
    <div class="photo-tracker" id="photoTracker">
      
      <!-- Custom Background Lines & Lights from Builder Tool -->
      <div id="customBackgroundElements">
        <div class="custom-bg-el-0"></div> <!-- Horizontal Rail -->
        
        <!-- Background Lights el 5-19 (15 total) -->
        <div class="custom-bg-el-5"></div>
        <div class="custom-bg-el-6"></div>
        <div class="custom-bg-el-7"></div>
        <div class="custom-bg-el-8"></div>
        <div class="custom-bg-el-9"></div>
        <div class="custom-bg-el-10"></div>
        <div class="custom-bg-el-11"></div>
        <div class="custom-bg-el-12"></div>
        <div class="custom-bg-el-13"></div>
        <div class="custom-bg-el-14"></div>
        <div class="custom-bg-el-15"></div>
        <div class="custom-bg-el-16"></div>
        <div class="custom-bg-el-17"></div>
        <div class="custom-bg-el-18"></div>
        <div class="custom-bg-el-19"></div>
      </div>

      <!-- Articulated SVG running man -->
      <div class="man-container" id="manContainer">
        <svg class="man-svg" viewBox="-50 -20 300 400" xmlns="http://www.w3.org/2000/svg">
          <g id="runner" stroke="#000000" fill="#000000" stroke-linecap="round" stroke-linejoin="round">

            <g id="arm-back">
              <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
              <g id="elbow-back">
                <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
                <g id="briefcase-group">
                  <path d="M 90 160 v -10 h 20 v 10" stroke-width="4" fill="none" />
                  <!-- Briefcase body with interior papers -->
                  <rect x="75" y="160" width="50" height="35" rx="4" fill="#333" stroke="none" />
                  <rect x="80" y="165" width="40" height="25" fill="#fff" stroke="none" />
                  <line x1="85" y1="172" x2="115" y2="172" stroke="#ccc" stroke-width="2" />
                  <line x1="85" y1="178" x2="110" y2="178" stroke="#ccc" stroke-width="2" />
                  <line x1="85" y1="184" x2="115" y2="184" stroke="#ccc" stroke-width="2" />
                  <!-- Briefcase lid that breaks open -->
                  <g id="lid-hinge">
                    <g id="lid-flapper">
                      <rect x="75" y="160" width="50" height="35" rx="4" fill="#000" stroke="#000" stroke-width="1" />
                      <rect x="95" y="160" width="10" height="5" fill="#e0e0e0" stroke="none" />
                    </g>
                  </g>
                </g>
              </g>
            </g>

            <g id="leg-back">
              <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
              <g id="knee-back">
                <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z"
                  stroke="none" />
              </g>
            </g>

            <g id="head-torso">
              <g id="torso-body">
                <path d="M 92 35 
                         C 115 40, 120 80, 112 145 
                         C 105 150, 95 150, 88 145 
                         C 80 80, 85 40, 92 35 Z" stroke="none" />
              </g>
              <ellipse cx="100" cy="18" rx="14" ry="22" stroke="none" />
            </g>

            <g id="leg-front">
              <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
              <g id="knee-front">
                <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z"
                  stroke="none" />
              </g>
            </g>

            <g id="arm-front">
              <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
              <g id="elbow-front">
                <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
              </g>
            </g>

          </g>
        </svg>
      </div>
    </div>

    <!-- Papers layer -->
    <div class="papers-layer" id="papersLayer"></div>
    <!-- Wind swirls -->
    <div class="wind-container" id="windContainer"></div>
  </div>

  <nav class="main-nav" id="mainNav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <div class="logo-man-container">
          <svg viewBox="-50 -20 300 400" xmlns="http://www.w3.org/2000/svg">
            <g class="logo-runner" stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(-2deg); transform-origin: 100px 180px;">
              <g class="logo-arm-back" style="transform-origin: 100px 60px; transform: rotate(-5deg);">
                <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
                <g class="logo-elbow-back" style="transform-origin: 100px 110px; transform: rotate(1deg);">
                  <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
                  <g class="logo-briefcase" style="transform-origin: 100px 160px; transform: rotate(5deg);">
                    <path d="M 90 160 v -10 h 20 v 10" stroke-width="4" fill="none" />
                    <rect x="75" y="160" width="50" height="35" rx="4" />
                  </g>
                </g>
              </g>
              <g class="logo-leg-back" style="transform-origin: 100px 140px; transform: rotate(32deg);">
                <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
                <g class="logo-knee-back" style="transform-origin: 100px 200px; transform: rotate(30deg);">
                  <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                  <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z" stroke="none" />
                </g>
              </g>
              <g class="logo-head-torso">
                <path d="M 92 35 C 115 40, 120 80, 112 145 C 105 150, 95 150, 88 145 C 80 80, 85 40, 92 35 Z" stroke="none" />
                <ellipse cx="100" cy="18" rx="14" ry="22" stroke="none" />
              </g>
              <g class="logo-leg-front" style="transform-origin: 100px 140px; transform: rotate(-18deg);">
                <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
                <g class="logo-knee-front" style="transform-origin: 100px 200px; transform: rotate(17deg);">
                  <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                  <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z" stroke="none" />
                </g>
              </g>
              <g class="logo-arm-front" style="transform-origin: 100px 60px; transform: rotate(36deg);">
                <line x1="100" y1="60" x2="100" y2="110" stroke-width="16" />
                <g class="logo-elbow-front" style="transform-origin: 100px 110px; transform: rotate(-11deg);">
                  <line x1="100" y1="110" x2="100" y2="160" stroke-width="14" />
                </g>
              </g>
            </g>
          </svg>
        </div>
        <span class="logo-branding-text">PRUS PHOTOGRAPHY</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="active">Home</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </div>
      <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <footer class="site-footer home-footer" id="homeFooter">
    <div class="container">
      <div class="footer-branding">
        <div class="logo-man-container small">
          <!-- Simplified man for footer -->
          <svg viewBox="-50 -20 300 400" xmlns="http://www.w3.org/2000/svg">
            <g stroke="currentColor" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 92 35 C 115 40, 120 80, 112 145 C 105 150, 95 150, 88 145 C 80 80, 85 40, 92 35 Z" />
              <ellipse cx="100" cy="18" rx="14" ry="22" />
            </g>
          </svg>
        </div>
        <span class="footer-branding-text">PRUS PHOTOGRAPHY</span>
      </div>
      <p class="footer-text" style="color:#999;">© 2026 Prus Photography. All Rights Reserved.</p>
    </div>
  </footer>

  <script type="module" src="/opening-experiment/js/watermark.js"></script>
  <script type="module" src="/opening-experiment/js/main.js?v=12"></script>
</body>

</html>
