<body>

  <!-- =============================================
       PHOTO REVEAL OVERLAY
       Shows the original logo photo, then fades out
       ============================================= -->
  <div class="photo-reveal" id="photoReveal">
    <img src="/original_logo_photo.JPG" alt="Original logo photograph — silhouette of a man walking" class="photo-reveal-img" />
  </div>

  <div class="intro-scene" id="introScene">

    <!-- Container that perfectly mirrors the object-fit: cover of the photo -->
    <div class="photo-tracker" id="photoTracker">

      <!-- Custom Background Lines & Lights from Builder Tool -->
      <div id="customBackgroundElements">
        <div class="custom-bg-el-0"></div> <!-- Horizontal Rail -->

        <!-- Background Lights el 5-19 (15 total) -->
        <div class="custom-bg-el-5"></div>
        <div class="custom-bg-el-6"></div>
        <div class="custom-bg-el-7"></div>
        <div class="custom-bg-el-8"></div>
        <div class="custom-bg-el-9"></div>
        <div class="custom-bg-el-10"></div>
        <div class="custom-bg-el-11"></div>
        <div class="custom-bg-el-12"></div>
        <div class="custom-bg-el-13"></div>
        <div class="custom-bg-el-14"></div>
        <div class="custom-bg-el-15"></div>
        <div class="custom-bg-el-16"></div>
        <div class="custom-bg-el-17"></div>
        <div class="custom-bg-el-18"></div>
        <div class="custom-bg-el-19"></div>
      </div>

      <!-- Articulated SVG running man -->
      <div class="man-container" id="manContainer">
        <svg class="man-svg" viewBox="-50 -20 300 400" xmlns="http://www.w3.org/2000/svg">
          <g id="runner" stroke="#000000" fill="#000000" stroke-linecap="round" stroke-linejoin="round">

            <g id="arm-back">
              <!-- Upper arm: shirt sleeve with wrinkles -->
              <path d="M 91 58
                       C 89 65, 91 72, 90 79
                       C 89 86, 91 96, 93 110
                       L 107 110
                       C 109 96, 111 86, 110 79
                       C 109 72, 111 65, 109 58 Z" stroke="none" />
              <g id="elbow-back">
                <!-- Forearm tapering to wrist, hand grips briefcase handle -->
                <path d="M 94 108
                         C 93 118, 92 128, 93 138
                         C 93 145, 94 150, 95 156
                         L 96 160
                         L 104 160
                         L 105 156
                         C 106 150, 107 145, 107 138
                         C 108 128, 107 118, 106 108 Z" stroke="none" />
                <g id="briefcase-group">
                  <path d="M 90 160 v -10 h 20 v 10" stroke-width="4" fill="none" />
                  <!-- Briefcase body with interior papers -->
                  <rect x="75" y="160" width="50" height="35" rx="4" fill="#333" stroke="none" />
                  <rect x="80" y="165" width="40" height="25" fill="#fff" stroke="none" />
                  <line x1="85" y1="172" x2="115" y2="172" stroke="#ccc" stroke-width="2" />
                  <line x1="85" y1="178" x2="110" y2="178" stroke="#ccc" stroke-width="2" />
                  <line x1="85" y1="184" x2="115" y2="184" stroke="#ccc" stroke-width="2" />
                  <!-- Briefcase lid that breaks open -->
                  <g id="lid-hinge">
                    <g id="lid-flapper">
                      <rect x="75" y="160" width="50" height="35" rx="4" fill="#000" stroke="#000" stroke-width="1" />
                      <rect x="95" y="160" width="10" height="5" fill="#e0e0e0" stroke="none" />
                    </g>
                  </g>
                </g>
              </g>
            </g>

            <g id="leg-back">
              <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
              <g id="knee-back">
                <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z"
                  stroke="none" />
              </g>
            </g>

            <g id="head-torso">
              <g id="torso-body">
                <!-- Torso: back collar higher, front collar lower, lean body with wrinkles -->
                <path d="M 93 36
                         C 96 37, 100 39, 104 41
                         C 108 43, 111 45, 111 47
                         C 112 49, 114 53, 115 58
                         C 116 65, 114 72, 115 78
                         C 116 83, 114 88, 115 93
                         C 116 100, 113 112, 112 122
                         C 111 132, 110 142, 110 145
                         C 105 148, 95 148, 90 145
                         C 90 142, 89 132, 88 122
                         C 87 112, 84 100, 85 93
                         C 86 88, 84 83, 85 78
                         C 86 72, 84 65, 85 58
                         C 86 53, 88 48, 89 44
                         C 88 41, 87 39, 88 37
                         C 89 36, 91 36, 93 36 Z" stroke="none" />
              </g>
              <!-- Realistic head silhouette (right-facing profile) -->
              <path d="M 98 40
                       C 96 38, 88 36, 86 28
                       C 84 20, 84 10, 87 4
                       C 89 -1, 93 -4, 98 -4
                       C 102 -4, 106 -3, 108 0
                       C 110 3, 111 6, 111 8
                       C 111 10, 110 11, 110 12
                       C 112 13, 114 14, 114 16
                       C 114 18, 112 19, 111 19
                       C 111 20, 112 22, 112 24
                       C 112 26, 110 28, 108 30
                       C 106 32, 104 34, 103 36
                       C 102 38, 100 40, 98 40 Z" stroke="none" />
            </g>

            <g id="leg-front">
              <line x1="100" y1="140" x2="100" y2="200" stroke-width="20" />
              <g id="knee-front">
                <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />
                <path d="M 90 255 L 90 270 L 98 270 L 98 267 L 108 267 L 112 270 L 124 270 Q 130 270 126 260 L 110 254 Z"
                  stroke="none" />
              </g>
            </g>

            <g id="arm-front">
              <!-- Upper arm: shirt sleeve with wrinkles -->
              <path d="M 91 58
                       C 89 65, 91 72, 90 79
                       C 89 86, 91 96, 93 110
                       L 107 110
                       C 109 96, 111 86, 110 79
                       C 109 72, 111 65, 109 58 Z" stroke="none" />
              <g id="elbow-front">
                <!-- Forearm tapering to wrist with relaxed hand -->
                <path d="M 94 108
                         C 93 118, 92 128, 93 138
                         C 93 145, 94 150, 95 155
                         C 94 158, 93 161, 93 163
                         C 92 166, 93 169, 95 171
                         C 97 172, 99 173, 101 173
                         C 104 173, 107 171, 108 168
                         C 109 165, 109 162, 108 159
                         C 107 156, 106 153, 106 150
                         C 107 145, 107 138, 107 138
                         C 108 128, 107 118, 106 108 Z" stroke="none" />
              </g>
            </g>

          </g>
        </svg>
      </div>
    </div>

    <!-- Papers layer -->
    <div class="papers-layer" id="papersLayer"></div>
    <!-- Wind swirls -->
    <div class="wind-container" id="windContainer"></div>
  </div>

                <g class="logo-knee-front" style="transform-origin: 100px 200px; transform: rotate(17deg);">
                  <line x1="100" y1="200" x2="100" y2="260" stroke-width="18" />

                </g>
              </g>
            </g>
          </svg>
        </div>
        <span class="logo-branding-text">PRUS PHOTOGRAPHY</span>
