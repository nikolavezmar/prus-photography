<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo vs SVG Man — Overlap Comparison Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .overlap-display {
            font-size: 3rem;
            font-weight: 700;
            margin: 10px 0 20px;
            padding: 10px 30px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .overlap-display.pass {
            color: #4caf50;
            border-color: #4caf50;
        }

        .overlap-display.fail {
            color: #f44336;
            border-color: #f44336;
        }

        .views {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .view-panel {
            text-align: center;
        }

        .view-panel h3 {
            margin-bottom: 8px;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
        }

        canvas {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: #000;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            line-height: 1.8;
        }

        #loading {
            font-size: 1.2rem;
            color: #888;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <h1>Logo vs SVG Man — Overlap Comparison</h1>
    <div class="overlap-display" id="overlapDisplay">—</div>
    <div id="loading">Loading & analyzing...</div>

    <div class="views" id="viewsContainer" style="display:none;">
        <div class="view-panel">
            <h3>Original Logo (body only)</h3>
            <canvas id="logoCanvas" width="400" height="500"></canvas>
        </div>
        <div class="view-panel">
            <h3>SVG Man (linger pose)</h3>
            <canvas id="svgCanvas" width="400" height="500"></canvas>
        </div>
        <div class="view-panel">
            <h3>Overlay Comparison</h3>
            <canvas id="overlayCanvas" width="400" height="500"></canvas>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#4caf50;"></div> Overlap
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#f44336;"></div> Logo only
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#2196f3;"></div> SVG only
                </div>
            </div>
        </div>
    </div>
    <div class="stats" id="statsDisplay"></div>

    <!-- Hidden SVG man — traced silhouette from logo contour -->
    <div id="svgRenderArea" style="position:absolute; left:-9999px; top:0;">
        <svg viewBox="0 0 200 340" id="manSvgCopy" xmlns="http://www.w3.org/2000/svg"
            style="height:680px; width:400px; overflow:visible;">
            <!-- Traced directly from logo.png body contour — 121 simplified boundary points -->
            <path
                d="M104.4,10 L97.1,14.4 L94.1,21.7 L94.1,37.9 L97.1,40.8 L98.5,54 L94.1,55.5 L94.1,62.8 L91.2,62.8 L78,77.5 L75,90.7 L70.6,96.6 L70.6,102.5 L66.2,105.4 L63.3,114.2 L58.9,118.6 L57.4,126 L51.6,133.3 L47.2,149.4 L41.3,159.7 L42.8,167.1 L38.3,172.9 L39.8,177.3 L36.9,180.3 L36.9,190.6 L31,197.9 L31,214 L33.9,217 L47.2,205.2 L50.1,197.9 L50.1,186.1 L53,181.7 L51.6,175.9 L56,168.5 L54.5,164.1 L60.4,152.4 L61.8,142.1 L70.6,130.4 L76.5,130.4 L79.4,137.7 L79.4,148 L82.4,149.4 L82.4,159.7 L79.4,162.7 L75,162.7 L75,165.6 L72.1,167.1 L75,208.2 L78,211.1 L89.7,211.1 L91.2,222.8 L88.3,231.7 L80.9,239 L66.2,246.3 L58.9,255.1 L50.1,255.1 L45.7,262.5 L28.1,272.8 L16.3,272.8 L17.8,306.5 L22.2,319.7 L29.5,321.2 L31,315.3 L28.1,312.4 L28.1,308 L38.3,288.9 L47.2,287.4 L53,280.1 L60.4,277.2 L66.2,271.3 L70.6,271.3 L101.5,253.7 L105.9,249.3 L113.2,227.2 L120.6,225.8 L120.6,230.2 L126.4,234.6 L129.4,241.9 L129.4,288.9 L130.8,300.6 L133.8,302.1 L127.9,324.1 L127.9,327.1 L130.8,328.5 L179.3,328.5 L182.2,325.6 L182.2,321.2 L160.2,315.3 L157.2,312.4 L157.2,305 L154.3,303.6 L154.3,262.5 L151.4,230.2 L148.4,227.2 L141.1,206.7 L142.6,181.7 L139.6,180.3 L141.1,170 L133.8,159.7 L126.4,156.8 L126.4,153.9 L129.4,152.4 L129.4,142.1 L125,136.2 L125,123 L122,117.2 L122,92.2 L116.1,80.5 L116.1,73.1 L119.1,70.2 L114.7,65.8 L114.7,61.4 L123.5,57 L126.4,46.7 L130.8,42.3 L127.9,39.4 L127.9,27.6 L123.5,20.3 L123.5,15.9 L111.7,10 L105.9,10 Z"
                fill="#111" />
        </svg>
    </div>

    <script>
        const CW = 400, CH = 500;
        const THRESH = 128;

        async function run() {
            const loading = document.getElementById('loading');
            const logoImg = await loadImage('/images/logo.png');
            const logoBB = getLogoBodyBounds(logoImg);
            const logoMask = renderLogoBodyMask(logoImg, logoBB);
            const svgMask = await renderSvgManMask();
            const result = computeOverlap(logoMask, svgMask);
            loading.style.display = 'none';
            document.getElementById('viewsContainer').style.display = 'flex';
            displayResults(logoMask, svgMask, result);
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        function getLogoBodyBounds(img) {
            const tmp = document.createElement('canvas');
            tmp.width = img.naturalWidth; tmp.height = img.naturalHeight;
            const ctx = tmp.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, tmp.width, tmp.height);
            const rowCounts = new Array(tmp.height).fill(0);
            let minX = tmp.width, minY = tmp.height, maxX = 0, maxY = 0;
            for (let y = 0; y < tmp.height; y++) {
                for (let x = 0; x < tmp.width; x++) {
                    const i = (y * tmp.width + x) * 4;
                    const b = (data.data[i] + data.data[i + 1] + data.data[i + 2]) / 3;
                    if (b > THRESH) {
                        rowCounts[y]++;
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                    }
                }
            }
            const midY = Math.floor((minY + maxY) / 2);
            const maxRC = Math.max(...rowCounts);
            let bodyBottom = maxY;
            for (let y = midY; y <= maxY; y++) {
                if (rowCounts[y] < maxRC * 0.05 && y > midY + 10) { bodyBottom = y; break; }
            }
            let bx1 = tmp.width, by1 = tmp.height, bx2 = 0, by2 = 0;
            for (let y = minY; y <= bodyBottom; y++) {
                for (let x = minX; x <= maxX; x++) {
                    const i = (y * tmp.width + x) * 4;
                    const b = (data.data[i] + data.data[i + 1] + data.data[i + 2]) / 3;
                    if (b > THRESH) {
                        if (x < bx1) bx1 = x; if (x > bx2) bx2 = x;
                        if (y < by1) by1 = y; if (y > by2) by2 = y;
                    }
                }
            }
            return { bx1, by1, bx2, by2, bodyBottom };
        }

        function renderLogoBodyMask(img, bb) {
            const srcW = bb.bx2 - bb.bx1 + 1, srcH = bb.by2 - bb.by1 + 1;
            const scale = Math.min((CW - 20) / srcW, (CH - 20) / srcH);
            const dw = srcW * scale, dh = srcH * scale;
            const dx = (CW - dw) / 2, dy = (CH - dh) / 2;
            const tmp = document.createElement('canvas');
            tmp.width = CW; tmp.height = CH;
            const ctx = tmp.getContext('2d');
            ctx.drawImage(img, bb.bx1, bb.by1, srcW, srcH, dx, dy, dw, dh);
            const data = ctx.getImageData(0, 0, CW, CH);
            const mask = new Uint8Array(CW * CH);
            for (let i = 0; i < CW * CH; i++) {
                const b = (data.data[i * 4] + data.data[i * 4 + 1] + data.data[i * 4 + 2]) / 3;
                if (b > THRESH) mask[i] = 1;
            }
            window._logoTF = { dx, dy, dw, dh, scale, srcW, srcH };
            return mask;
        }

        async function renderSvgManMask() {
            const svgEl = document.getElementById('manSvgCopy');
            const svgStr = new XMLSerializer().serializeToString(svgEl);
            const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const img = await loadImage(url);
            URL.revokeObjectURL(url);

            const big = document.createElement('canvas');
            big.width = 800; big.height = 800;
            const bctx = big.getContext('2d');
            const aspect = img.naturalWidth / img.naturalHeight;
            let rw, rh;
            if (aspect > 1) { rw = 780; rh = rw / aspect; }
            else { rh = 780; rw = rh * aspect; }
            bctx.drawImage(img, (800 - rw) / 2, (800 - rh) / 2, rw, rh);

            const bdata = bctx.getImageData(0, 0, 800, 800);
            let minX = 800, minY = 800, maxX = 0, maxY = 0;
            for (let y = 0; y < 800; y++) {
                for (let x = 0; x < 800; x++) {
                    const a = bdata.data[(y * 800 + x) * 4 + 3];
                    if (a > 50) {
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                    }
                }
            }
            const svgW = maxX - minX + 1, svgH = maxY - minY + 1;
            const lt = window._logoTF;
            const svgScale = Math.min(lt.dw / svgW, lt.dh / svgH);
            const fdw = svgW * svgScale, fdh = svgH * svgScale;
            const fdx = lt.dx + (lt.dw - fdw) / 2;
            const fdy = lt.dy + (lt.dh - fdh) / 2;

            const tmp = document.createElement('canvas');
            tmp.width = CW; tmp.height = CH;
            const ctx = tmp.getContext('2d');
            ctx.drawImage(big, minX, minY, svgW, svgH, fdx, fdy, fdw, fdh);
            const data = ctx.getImageData(0, 0, CW, CH);
            const mask = new Uint8Array(CW * CH);
            for (let i = 0; i < CW * CH; i++) {
                const a = data.data[i * 4 + 3];
                const r = data.data[i * 4], g = data.data[i * 4 + 1], b = data.data[i * 4 + 2];
                if (a > 50 && (r + g + b) / 3 < 200) mask[i] = 1;
            }
            return mask;
        }

        function computeOverlap(logoMask, svgMask) {
            // Center of mass alignment
            let lCx = 0, lCy = 0, lCount = 0, sCx = 0, sCy = 0, sCount = 0;
            for (let y = 0; y < CH; y++) {
                for (let x = 0; x < CW; x++) {
                    const i = y * CW + x;
                    if (logoMask[i]) { lCx += x; lCy += y; lCount++; }
                    if (svgMask[i]) { sCx += x; sCy += y; sCount++; }
                }
            }
            lCx /= lCount; lCy /= lCount; sCx /= sCount; sCy /= sCount;
            const shiftX = Math.round(lCx - sCx), shiftY = Math.round(lCy - sCy);

            const aligned = new Uint8Array(CW * CH);
            for (let y = 0; y < CH; y++) {
                for (let x = 0; x < CW; x++) {
                    const srcX = x - shiftX, srcY = y - shiftY;
                    if (srcX >= 0 && srcX < CW && srcY >= 0 && srcY < CH)
                        aligned[y * CW + x] = svgMask[srcY * CW + srcX];
                }
            }

            let logoOnly = 0, svgOnly = 0, overlap = 0, union = 0;
            for (let i = 0; i < CW * CH; i++) {
                const l = logoMask[i], s = aligned[i];
                if (l && s) { overlap++; union++; }
                else if (l) { logoOnly++; union++; }
                else if (s) { svgOnly++; union++; }
            }
            const overlapPct = union > 0 ? (overlap / union * 100) : 0;
            for (let i = 0; i < CW * CH; i++) svgMask[i] = aligned[i];
            return {
                overlap, logoOnly, svgOnly, union, overlapPct, shiftX, shiftY,
                logoCOM: { x: lCx.toFixed(0), y: lCy.toFixed(0) },
                svgCOM: { x: sCx.toFixed(0), y: sCy.toFixed(0) }
            };
        }

        function displayResults(logoMask, svgMask, result) {
            const lCtx = document.getElementById('logoCanvas').getContext('2d');
            const lData = lCtx.createImageData(CW, CH);
            for (let i = 0; i < CW * CH; i++) {
                if (logoMask[i]) { lData.data[i * 4] = 255; lData.data[i * 4 + 1] = 255; lData.data[i * 4 + 2] = 255; }
                lData.data[i * 4 + 3] = 255;
            }
            lCtx.putImageData(lData, 0, 0);

            const sCtx = document.getElementById('svgCanvas').getContext('2d');
            const sData = sCtx.createImageData(CW, CH);
            for (let i = 0; i < CW * CH; i++) {
                if (svgMask[i]) { sData.data[i * 4] = 255; sData.data[i * 4 + 1] = 255; sData.data[i * 4 + 2] = 255; }
                sData.data[i * 4 + 3] = 255;
            }
            sCtx.putImageData(sData, 0, 0);

            const oCtx = document.getElementById('overlayCanvas').getContext('2d');
            const oData = oCtx.createImageData(CW, CH);
            for (let i = 0; i < CW * CH; i++) {
                const l = logoMask[i], s = svgMask[i], pi = i * 4;
                if (l && s) { oData.data[pi] = 76; oData.data[pi + 1] = 175; oData.data[pi + 2] = 80; }
                else if (l) { oData.data[pi] = 244; oData.data[pi + 1] = 67; oData.data[pi + 2] = 54; }
                else if (s) { oData.data[pi] = 33; oData.data[pi + 1] = 150; oData.data[pi + 2] = 243; }
                else { oData.data[pi] = 20; oData.data[pi + 1] = 20; oData.data[pi + 2] = 20; }
                oData.data[pi + 3] = 255;
            }
            oCtx.putImageData(oData, 0, 0);

            const pct = result.overlapPct.toFixed(1);
            const el = document.getElementById('overlapDisplay');
            el.textContent = pct + '% overlap';
            el.classList.add(result.overlapPct >= 90 ? 'pass' : 'fail');

            document.getElementById('statsDisplay').innerHTML = `
        Overlap: ${result.overlap.toLocaleString()} | 
        Logo-only: ${result.logoOnly.toLocaleString()} | 
        SVG-only: ${result.svgOnly.toLocaleString()} | 
        Union: ${result.union.toLocaleString()} | 
        IoU: ${pct}%<br>
        COM shift: (${result.shiftX}, ${result.shiftY})px | 
        Logo COM: (${result.logoCOM.x}, ${result.logoCOM.y}) | 
        SVG COM: (${result.svgCOM.x}, ${result.svgCOM.y})
      `;
        }

        run().catch(err => {
            document.getElementById('loading').textContent = 'Error: ' + err.message;
            console.error(err);
        });
    </script>
</body>

</html>
