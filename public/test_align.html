<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background: #eee;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .frame-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .man-sprite {
            width: 200px;
            height: 340px;
            background-image: url('/images/sprite_sheet_mirrored.png');
            background-size: 500% 500%;
            /* If 5x5 grid, it's 500% */
            background-repeat: no-repeat;
        }
    </style>
</head>

<body>
    <script>
        const positions = [
            [0, 0], [25, 0], [50, 0], [75, 0], [100, 0],
            [0, 25], [25, 25], [50, 25], [75, 25], [100, 25],
            [0, 50], [25, 50], [50, 50], [75, 50], [100, 50],
            [0, 75], [25, 75], [50, 75], [75, 75], [100, 75],
            [0, 100]
        ];
        positions.forEach((pos, i) => {
            const div = document.createElement('div');
            div.className = 'frame-container';
            div.innerHTML = `
        <h3>Frame ${i} [${(i * 4.7619).toFixed(2)}%]</h3>
        <div class="man-sprite" style="background-position: ${pos[0]}% ${pos[1]}%;"></div>
      `;
            document.body.appendChild(div);
        });
    </script>
</body>

</html>
